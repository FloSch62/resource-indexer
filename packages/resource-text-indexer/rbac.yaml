apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: resource-text-indexer-read-all
  labels:
    app.kubernetes.io/name: resource-text-indexer
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*", "/openapi", "/openapi/*"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: resource-text-indexer-read-all
  labels:
    app.kubernetes.io/name: resource-text-indexer
subjects:
  - kind: ServiceAccount
    name: resource-text-indexer
    namespace: resource-text-indexer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: resource-text-indexer-read-all
