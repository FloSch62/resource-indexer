apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-text-indexer
  namespace: resource-text-indexer
  labels:
    app.kubernetes.io/name: resource-text-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: resource-text-indexer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: resource-text-indexer
    spec:
      serviceAccountName: resource-text-indexer
      containers:
        - name: app
          # Use a persistent registry image (for example GHCR/ECR/GCR/ACR), not ttl.sh.
          image: ghcr.io/flosch62/resource-indexer:v0.2.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: MAX_PAGE_SIZE
              value: "5000"
            - name: RESYNC_PERIOD
              value: "10m"
            - name: EXCLUDE_GVRS
              value: ""
            - name: EXCLUDE_NAMESPACES
              value: ""
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
